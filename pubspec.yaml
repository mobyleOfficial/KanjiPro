name: kanji_pro
description: "Offline kanji-learning app (JLPT N5-N1) with flashcards and quiz modes."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  core:
    path: core
  common:
    path: ui/common
  kanji:
    path: features/kanji
  kanji_domain:
    path: features/kanji/domain
  kanji_data:
    path: features/kanji/data
  progress:
    path: features/progress
  progress_domain:
    path: features/progress/domain
  progress_data:
    path: features/progress/data
  quiz:
    path: features/quiz
  quiz_domain:
    path: features/quiz/domain
  home_ui:
    path: ui/home_ui
  flutter_bloc: ^9.0.0
  get_it: ^8.0.0
  injectable: ^2.5.0
  auto_route: ^9.2.0
  objectbox: ^4.0.0
  objectbox_flutter_libs: ^4.0.0
  json_annotation: ^4.9.0
  flutter_tts: ^4.2.0
  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.0
  injectable_generator: ^2.6.0
  auto_route_generator: ^9.0.0
  json_serializable: ^6.8.0
  objectbox_generator: ^4.0.0
  mocktail: ^1.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/data/
