name: common
description: Shared UI utilities for KanjiPro (theme, l10n, TTS).
publish_to: 'none'
version: 0.0.1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_tts: ^4.2.0
  audioplayers: ^6.0.0
  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  generate: true
  assets:
    - assets/audio/
